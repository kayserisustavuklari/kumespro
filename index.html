<style>
:root{
  --pri:#2E7FCC; --pri-d:#1A5C9E; --pri-l:#E8F3FC;
  --ora:#E8711A; --ora-d:#B8520E; --ora-l:#FEF0E6;
  --gr0:#1E2832; --gr1:#3A4552; --gr2:#6B7685;
  --gr3:#9DA8B4; --gr4:#C8D0D8; --gr5:#E4E8EC; --gr6:#F2F5F7;
  --white:#FFFFFF; --green:#2D8A55; --red:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--gr6);font-family:'Instrument Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:100vh}

.login-card{
  background:var(--white);border-radius:24px;
  padding:36px 28px;width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(0,0,0,.12);
  text-align:center;
}
.logo-wrap{
  width:72px;height:72px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--pri),var(--pri-d));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:38px;
  box-shadow:0 4px 16px rgba(46,127,204,.35);
}
.app-name{font-family:'Dela Gothic One',sans-serif;font-size:30px;color:var(--gr0);letter-spacing:-.5px}
.app-sub{font-size:13px;color:var(--gr3);margin-top:6px;font-weight:500}

.divider{display:flex;align-items:center;gap:12px;margin:28px 0;color:var(--gr3);font-size:12px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gr4)}

.btn-google{
  width:100%;padding:14px 18px;border-radius:12px;
  border:1.5px solid var(--gr4);background:var(--white);
  color:var(--gr0);font-size:15px;font-weight:600;
  font-family:'Instrument Sans',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
  transition:background .15s,border-color .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.btn-google:hover{background:var(--gr6);border-color:var(--gr3);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.btn-google:active{transform:scale(.98)}
.google-icon{width:22px;height:22px;flex-shrink:0}

.status{
  margin-top:20px;padding:12px 16px;border-radius:10px;
  font-size:13px;font-weight:500;display:none;
}
.status.loading{background:var(--pri-l);color:var(--pri-d);border:1.5px solid rgba(46,127,204,.3);display:block}
.status.error  {background:#FDECEA;color:var(--red);border:1.5px solid #F0AAAA;display:block}

.features{margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left}
.feat{background:var(--gr6);border-radius:10px;padding:10px 12px}
.feat-icon{font-size:18px;margin-bottom:4px}
.feat-text{font-size:11px;color:var(--gr2);font-weight:500;line-height:1.4}

.footer{margin-top:24px;font-size:11px;color:var(--gr3);line-height:1.6}
.footer strong{color:var(--gr2)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--pri-l);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px}
</style>
</head>

async function init() {

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Yönlendiriliyor...';
  st.className = 'status loading';
  st.textContent = '⏳ Google hesabına yönlendiriliyor...';

  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: SITE_URL + '/app.html',
      queryParams: { prompt: 'select_account' }
    }
  });

  if (error) {
    st.className = 'status error';
    st.textContent = '❌ Hata: ' + error.message;
    btn.disabled = false;
    btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>Google ile Giriş Yap`;
  }
}

init();
